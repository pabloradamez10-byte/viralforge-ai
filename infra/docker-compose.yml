version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: viralforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: viralforge
      POSTGRES_PASSWORD: viralforge
      POSTGRES_DB: viralforge
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U viralforge']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: viralforge-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: viralforge-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_URL: ${APP_URL:-http://localhost:5173}
      API_URL: ${API_URL:-http://localhost:4000}
      DATABASE_URL: postgresql://viralforge:viralforge@postgres:5432/viralforge?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      BCRYPT_COST: 12
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost}
    ports:
      - '4000:4000'
    command: ['sh', '-c', 'npx prisma migrate deploy && node dist/server.js']

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: viralforge-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:4000/api/v1}

  nginx:
    image: nginx:alpine
    container_name: viralforge-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  redisdata:
